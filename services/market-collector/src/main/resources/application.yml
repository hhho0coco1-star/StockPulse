server:
  port: 8082

spring:
  application:
    name: market-collector
  datasource:
    url: jdbc:postgresql://localhost:5433/market
    username: ${TIMESCALE_USER:stockpulse}
    password: ${TIMESCALE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:changeme}

kis:
  app-key: ${KIS_APP_KEY}
  app-secret: ${KIS_APP_SECRET}
  base-url: https://openapivts.koreainvestment.com:29443
  ws-url: wss://openapivts.koreainvestment.com:29443/websocket
  subscribe-symbols:
    - "005930"
    - "000660"

logging:
  level:
    com.stockpulse: DEBUG
