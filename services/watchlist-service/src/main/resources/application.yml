server:
  port: 8092

spring:
  application:
    name: watchlist-service
  datasource:
    url: jdbc:postgresql://localhost:5432/watchlist
    username: ${POSTGRES_USER:stockpulse}
    password: ${POSTGRES_PASSWORD:changeme}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

logging:
  level:
    com.stockpulse: DEBUG
