server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**, /users/**
        - id: market-service
          uri: http://localhost:8082
          predicates:
            - Path=/market/**
        - id: insight-service
          uri: http://localhost:8085
          predicates:
            - Path=/insights/**
        - id: trading-service
          uri: http://localhost:8086
          predicates:
            - Path=/orders/**
        - id: account-service
          uri: http://localhost:8087
          predicates:
            - Path=/account/**
        - id: portfolio-service
          uri: http://localhost:8088
          predicates:
            - Path=/portfolio/**
        - id: ranking-service
          uri: http://localhost:8089
          predicates:
            - Path=/ranking/**
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:changeme}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    enabled: true
    sampling:
      probability: ${TRACE_SAMPLING:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
