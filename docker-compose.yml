# StockPulse — 로컬 개발 인프라 (WBS 0-2)
# Kafka(KRaft) · Redis · PostgreSQL · TimescaleDB · MongoDB
# 기동: cp .env.example .env  &&  docker compose up -d
# 주의: 최상위 version: 키는 obsolete 경고 방지를 위해 넣지 않는다.

services:
  # ── Kafka (KRaft 단일 노드, Zookeeper 미사용) ───────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: stockpulse-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"   # 호스트(앱 직접 접속)용 리스너. 충돌 시 .env에서 변경.
    environment:
      # KRaft: broker + controller 겸용 단일 노드
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      # 리스너: 내부(kafka:29092) / 컨트롤러(9093) / 호스트(localhost:9092)
      KAFKA_LISTENERS: "PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      # 단일 노드: 복제 계수 1 강제
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # 토픽은 이 단계에서 미생성. 개발 편의상 자동 생성 허용(파티션 키 설계는 후속 작업).
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # KRaft 클러스터 ID (.env로 관리). kafka-storage random-uuid 로 생성한 값.
      CLUSTER_ID: "${CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - stockpulse-net

  # ── Redis (캐시 / 랭킹 / Pub-Sub) ───────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: stockpulse-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-changeme}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"   # 기본 포트. 충돌 시 .env에서 변경.
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - stockpulse-net

  # ── PostgreSQL (트랜잭션용, 서비스별 6개 DB 분리) ────────────────────────
  postgres:
    image: postgres:16.4
    container_name: stockpulse-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"   # 기본 포트.
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-stockpulse}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
      POSTGRES_DB: "${POSTGRES_DB:-stockpulse}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro   # 최초 기동 시 6개 DB 생성
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockpulse} -d ${POSTGRES_DB:-stockpulse}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - stockpulse-net

  # ── TimescaleDB (시계열 시세, 별도 컨테이너) ─────────────────────────────
  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: stockpulse-timescaledb
    ports:
      - "${TIMESCALE_PORT:-5433}:5432"   # ⚠️ 내부는 5432, 호스트만 5433 (postgres 5432와 충돌 회피)
    environment:
      POSTGRES_USER: "${TIMESCALE_USER:-stockpulse}"
      POSTGRES_PASSWORD: "${TIMESCALE_PASSWORD:-changeme}"
      POSTGRES_DB: "${TIMESCALE_DB:-market}"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./init/timescaledb:/docker-entrypoint-initdb.d:ro   # 최초 기동 시 timescaledb 확장 활성
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER:-stockpulse} -d ${TIMESCALE_DB:-market}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - stockpulse-net

  # ── MongoDB (뉴스 / 인사이트 / 백테스트 문서) ───────────────────────────
  mongo:
    image: mongo:7.0
    container_name: stockpulse-mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"   # 기본 포트.
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_USER:-stockpulse}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_PASSWORD:-changeme}"
      MONGO_INITDB_DATABASE: "${MONGO_DB:-stockpulse}"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - stockpulse-net

# ── named volume (데이터 영속화: 컨테이너 재생성에도 유지) ──────────────────
volumes:
  kafka-data:
  redis-data:
  postgres-data:
  timescaledb-data:
  mongo-data:

# ── 사용자 정의 네트워크 (서비스명 DNS 통신) ────────────────────────────────
networks:
  stockpulse-net:
    driver: bridge
