name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - market-collector
          - news-collector
          - fundamentals-collector
          - insight-service
          - trading-service
          - account-service
          - portfolio-service
          - ranking-service
          - realtime-gateway
          - discussion-service
          - watchlist-service
          - notification-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          build-args: |
            SERVICE=services/${{ matrix.service }}
          tags: |
            ghcr.io/hhho0coco0/stockpulse/${{ matrix.service }}:latest
            ghcr.io/hhho0coco0/stockpulse/${{ matrix.service }}:${{ github.sha }}
          push: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Helm Deploy to K8s
    needs: images
    runs-on: ubuntu-latest
    if: ${{ secrets.KUBECONFIG != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Create namespace
        run: kubectl create namespace stockpulse-app --dry-run=client -o yaml | kubectl apply -f -

      - name: Upsert K8s secrets (git 미포함 민감값 주입)
        run: |
          kubectl create secret generic stockpulse-secrets \
            -n stockpulse-app \
            --from-literal=POSTGRES_PASSWORD='${{ secrets.POSTGRES_PASSWORD }}' \
            --from-literal=TIMESCALE_PASSWORD='${{ secrets.TIMESCALE_PASSWORD }}' \
            --from-literal=MONGO_PASSWORD='${{ secrets.MONGO_PASSWORD }}' \
            --from-literal=REDIS_PASSWORD='${{ secrets.REDIS_PASSWORD }}' \
            --from-literal=JWT_SECRET='${{ secrets.JWT_SECRET }}' \
            --from-literal=KIS_APP_KEY='${{ secrets.KIS_APP_KEY }}' \
            --from-literal=KIS_APP_SECRET='${{ secrets.KIS_APP_SECRET }}' \
            --from-literal=NAVER_CLIENT_ID='${{ secrets.NAVER_CLIENT_ID }}' \
            --from-literal=NAVER_CLIENT_SECRET='${{ secrets.NAVER_CLIENT_SECRET }}' \
            --from-literal=DART_API_KEY='${{ secrets.DART_API_KEY }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: GHCR pull secret
        run: |
          kubectl create secret docker-registry ghcr-pull-secret \
            -n stockpulse-app \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm dependency build
        run: helm dependency build helm/stockpulse

      - name: Helm upgrade (deploy)
        run: |
          helm upgrade --install stockpulse helm/stockpulse \
            -n stockpulse-app \
            -f helm/stockpulse/values-prod.yaml \
            --set global.imageTag=${{ github.sha }} \
            --wait --timeout 10m
