{{- range $name, $svc := .Values.services }}
{{- $hpaEnabled := (($svc.hpa).enabled) | default false }}
{{- $defaults := $.Values.defaults }}
{{- $resources := $svc.resources | default $defaults.resources }}
{{- $liveness := $defaults.probes.liveness }}
{{- $readiness := $defaults.probes.readiness }}
{{- $startup := $defaults.probes.startup }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namespace | default $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/part-of: stockpulse
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
    app: {{ $name }}
spec:
  {{- if not $hpaEnabled }}
  replicas: {{ $svc.replicas | default $defaults.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/part-of: stockpulse
        app: {{ $name }}
    spec:
      {{- with $.Values.app.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.app.imageRegistry }}/{{ $name }}:{{ $.Values.app.imageTag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: {{ $svc.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: stockpulse-common-config
          {{- if $svc.envFromSecret }}
          env:
            {{- range $svc.envFromSecret }}
            - name: {{ . }}
              valueFrom:
                secretKeyRef:
                  name: stockpulse-secrets
                  key: {{ . }}
            {{- end }}
          {{- end }}
          resources:
            requests:
              cpu: {{ $resources.requests.cpu }}
              memory: {{ $resources.requests.memory }}
            limits:
              cpu: {{ $resources.limits.cpu }}
              memory: {{ $resources.limits.memory }}
          startupProbe:
            httpGet:
              path: {{ $startup.path }}
              port: {{ $svc.port }}
            failureThreshold: {{ $startup.failureThreshold }}
            periodSeconds: {{ $startup.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ $liveness.path }}
              port: {{ $svc.port }}
            initialDelaySeconds: {{ $liveness.initialDelaySeconds }}
            periodSeconds: {{ $liveness.periodSeconds }}
            failureThreshold: {{ $liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ $readiness.path }}
              port: {{ $svc.port }}
            initialDelaySeconds: {{ $readiness.initialDelaySeconds }}
            periodSeconds: {{ $readiness.periodSeconds }}
            failureThreshold: {{ $readiness.failureThreshold }}
{{- end }}
